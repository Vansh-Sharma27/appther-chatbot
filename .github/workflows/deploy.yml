name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "crawler/**"
      - "Dockerfile*"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      deploy_api:
        description: "Build and deploy the API Lambda image"
        type: boolean
        default: true
      deploy_crawler:
        description: "Build and deploy the crawler image"
        type: boolean
        default: true
      deploy_widget:
        description: "Deploy widget static assets to S3"
        type: boolean
        default: true

env:
  AWS_DEFAULT_REGION: us-east-1

jobs:
  deploy-api:
    name: Build & push API image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_api || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CRAWLER_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: appther-chatbot/api
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f api/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name appther-chatbot-api \
            --image-uri ${{ steps.build-image.outputs.image }}

  deploy-crawler:
    name: Build & push crawler image
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_crawler || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CRAWLER_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: appther-chatbot/crawler
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f crawler/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy-widget:
    name: Deploy widget to S3
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_widget || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: widget

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: widget/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build widget
        run: npm run build

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CRAWLER_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload to S3
        run: |
          aws s3 sync dist/ s3://${{ vars.WIDGET_BUCKET_NAME }}/widget/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/widget/*"
